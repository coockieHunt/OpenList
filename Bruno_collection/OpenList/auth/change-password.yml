info:
  name: change password
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/auth/change-password"
  body:
    type: json
    data: |-
      {
        "current_password": "currentpassword",
        "new_password": "newpassword"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
