info:
  name: delete tem
  type: http
  seq: 1

http:
  method: DELETE
  url: "{{base_url}}/item/{{idList}}/{{idItem}}"
  body:
    type: json
    data: |-
      {
        id: 1
      }
  auth: inherit

runtime:
  variables:
    - name: idList
      value: "1"
    - name: idItem
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
