info:
  name: add item
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/item/{{idList}}"
  body:
    type: json
    data: |-
      {
          "name": "{{$randomWord}}",
          "quantity": 2,
          "validated": false
      }
  auth: inherit

runtime:
  variables:
    - name: idList
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
