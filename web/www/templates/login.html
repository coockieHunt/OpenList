<!doctype html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion - OpenList</title>

    <link rel="stylesheet" href="/assets/css/pico.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">

    <script src="/core/api.js"></script>
    <script type="module" src="/pages/login.js"></script>
</head>
<body>
    <main class="container" style="max-width: 560px; margin-top: 8vh;">
        <article>
            <header>
                <h1 style="margin-bottom: 0.35rem;">OpenList</h1>
            </header>

            <form id="login-form">
                <label for="username">Identifiant</label>
                <input id="username" name="username" type="text" autocomplete="username" required>

                <label for="password">Mot de passe</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>

                <button type="submit">Se connecter</button>
            </form>

            <p id="login-error" style="display:none; color: var(--pico-del-color); margin: 0.5rem 0 0;"></p>
            <footer>
                <small>le mot de passe par défaut est affiché lors de la première connexion. </small><br>
                <small>vous pouvez le changer dans les paramètres. ou par cli.</small>
            </footer>
        </article>
    </main>
</body>
</html>
