<!doctype html>
<html lang="fr" data-theme="dark">
<body>
    <main class="container" style="max-width: 680px; margin-top: 6vh;">
        {{ template "header" (dict "PageName" "Changer le mot de passe" "PageID" .PageID) }}

        <article>
            <header>
                <h3 style="margin-bottom: 0.35rem;">Mot de passe</h3>
            </header>

            <form id="change-password-form">
                <label for="current_password">Mot de passe actuel</label>
                <input id="current_password" name="current_password" type="password" autocomplete="current-password" required>

                <label for="new_password">Nouveau mot de passe</label>
                <input id="new_password" name="new_password" type="password" minlength="8" autocomplete="new-password" required>

                <label for="confirm_password">Confirmer le nouveau mot de passe</label>
                <input id="confirm_password" name="confirm_password" type="password" minlength="8" autocomplete="new-password" required>

                <button type="submit">Mettre à jour le mot de passe</button>
            </form>

            <p id="change-password-error" style="display:none; color: var(--pico-del-color); margin: 0.5rem 0 0;"></p>
            <p id="change-password-success" style="display:none; color: var(--pico-ins-color); margin: 0.5rem 0 0;"></p>
        </article>

        {{ template "footer" . }}
    </main>
</body>
</html>
